name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref — except tag builds (releases must finish).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  verify:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # The Electron binary isn't needed to lint/typecheck/test (vitest runs on jsdom),
      # and downloading it on Linux just wastes time.
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run test

  build-macos:
    name: Build macOS DMG
    needs: verify
    # Only build/package the DMG for releases (a `vX.Y.Z` tag) or a manual dispatch —
    # not on every push to main / PR (verify already gates those). This also avoids the
    # duplicate concurrent build when a release commit is pushed to main and tagged.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-14 # Apple Silicon
    permissions:
      contents: write # create releases on tag pushes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test
      # Not signed with a Developer ID or notarized (no cert in CI). electron-builder
      # still ad-hoc signs the arm64 app so it launches; downloaded copies need a
      # right-click > Open (or `xattr -dr com.apple.quarantine`). See BUILD.md.
      - name: Package macOS DMG (unsigned)
        run: npx electron-builder --mac --config config/electron-builder.config.cjs --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: loop-dmg
          path: dist/*.dmg
          if-no-files-found: error
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
